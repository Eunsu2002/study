<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>키오스크</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif;
    background: #f0f4ff;
    color: #1a2340;
    height: 100dvh;
    overflow: hidden;
    user-select: none;
  }

  /* ── 화면 공통 ── */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ── 메인 화면 ── */
  #screen-main {
    background: radial-gradient(ellipse at 50% 35%, #dce8ff 0%, #f0f4ff 65%);
    cursor: pointer;
  }
  #screen-main .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    margin-bottom: 80px;
  }
  #screen-main .icon {
    width: 100px;
    height: 100px;
    background: linear-gradient(135deg, #4f8ef7, #818cf8);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px rgba(79, 142, 247, 0.35);
  }
  #screen-main .icon svg { width: 56px; height: 56px; fill: #fff; }
  #screen-main h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #1a2340;
  }
  #screen-main .subtitle {
    font-size: 18px;
    color: #6b7db3;
    margin-top: -16px;
  }
  .touch-prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: pulse 2.2s ease-in-out infinite;
  }
  .touch-prompt .ring {
    width: 70px;
    height: 70px;
    border: 2.5px solid rgba(79, 142, 247, 0.5);
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .touch-prompt .ring::after {
    content: '';
    position: absolute;
    inset: -10px;
    border: 1.5px solid rgba(79, 142, 247, 0.2);
    border-radius: 50%;
    animation: ring-expand 2.2s ease-in-out infinite;
  }
  .touch-prompt .ring svg { width: 32px; height: 32px; fill: #4f8ef7; }
  .touch-prompt span {
    font-size: 20px;
    color: #6b7db3;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(0.97); }
  }
  @keyframes ring-expand {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* ── 생년월일 화면 ── */
  #screen-birth {
    background: linear-gradient(160deg, #e8eeff 0%, #f0f4ff 100%);
    gap: 0;
  }
  .birth-header {
    text-align: center;
    margin-bottom: 48px;
  }
  .birth-header h2 {
    font-size: 34px;
    font-weight: 700;
    color: #1a2340;
    margin-bottom: 10px;
  }
  .birth-header p {
    font-size: 18px;
    color: #6b7db3;
  }

  .birth-display {
    display: flex;
    gap: 10px;
    margin-bottom: 40px;
    align-items: center;
  }
  .digit-box {
    width: 64px;
    height: 80px;
    background: #fff;
    border: 2px solid #c8d4f0;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: #1a2340;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(79, 142, 247, 0.06);
  }
  .digit-box.filled {
    border-color: #4f8ef7;
    box-shadow: 0 4px 16px rgba(79, 142, 247, 0.18);
  }
  .digit-box.cursor {
    border-color: #4f8ef7;
    box-shadow: 0 4px 20px rgba(79, 142, 247, 0.28);
    animation: blink-border 1s ease-in-out infinite;
  }
  @keyframes blink-border {
    0%, 100% { border-color: #4f8ef7; }
    50% { border-color: #c8d4f0; }
  }

  .hint-text {
    font-size: 15px;
    color: #9aaace;
    margin-bottom: 16px;
  }
  .birth-error {
    font-size: 15px;
    color: #e05050;
    margin-bottom: 24px;
    min-height: 22px;
    font-weight: 500;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .birth-display.shake { animation: shake 0.4s ease; }

  /* 키패드 */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 340px;
  }
  .key {
    height: 78px;
    background: #fff;
    border: 1.5px solid #d8e2f8;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 600;
    color: #1a2340;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s, box-shadow 0.12s;
    box-shadow: 0 2px 8px rgba(79, 142, 247, 0.07);
    -webkit-tap-highlight-color: transparent;
  }
  .key:active { background: #e8eeff; transform: scale(0.95); box-shadow: none; }
  .key.key-delete {
    font-size: 20px;
  }
  .key.key-delete svg { fill: #9aaace; }
  .key.key-empty { background: transparent; border-color: transparent; box-shadow: none; pointer-events: none; }
  .key.key-confirm {
    background: linear-gradient(135deg, #4f8ef7, #818cf8);
    border-color: transparent;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    grid-column: span 3;
    height: 64px;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 24px rgba(79, 142, 247, 0.35);
    margin-top: 4px;
  }
  .key.key-confirm:active { background: linear-gradient(135deg, #3b7de0, #6366f1); box-shadow: none; }

  .birth-back {
    margin-top: 32px;
    font-size: 16px;
    color: #9aaace;
    cursor: pointer;
    padding: 12px 24px;
    border-radius: 10px;
    transition: color 0.2s;
  }
  .birth-back:active { color: #6b7db3; }

  /* ── 카드 입력 화면 ── */
  #screen-card {
    background: linear-gradient(160deg, #e8eeff 0%, #f0f4ff 100%);
  }
  .card-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  .card-icon {
    width: 110px;
    height: 110px;
    background: linear-gradient(135deg, #4f8ef7, #818cf8);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px rgba(79, 142, 247, 0.3);
    position: relative;
    overflow: hidden;
  }
  .card-icon::before {
    content: '';
    position: absolute;
    top: 18px;
    left: 14px;
    width: 32px;
    height: 24px;
    background: rgba(255, 220, 80, 0.9);
    border-radius: 5px;
  }
  .card-icon svg { width: 60px; height: 60px; fill: #fff; position: relative; z-index: 1; }
  .card-title {
    font-size: 36px;
    font-weight: 700;
    color: #1a2340;
    line-height: 1.3;
  }
  .card-subtitle {
    font-size: 18px;
    color: #6b7db3;
    line-height: 1.6;
  }

  /* 애니메이션 카드 슬롯 */
  .card-slot {
    width: 280px;
    height: 6px;
    background: #d8e2f8;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .card-slot-bar {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, #4f8ef7, transparent);
    animation: slide 1.8s ease-in-out infinite;
  }
  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  /* 타이머 */
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .timer-ring {
    position: relative;
    width: 80px;
    height: 80px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
    width: 80px;
    height: 80px;
  }
  .timer-ring circle {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
  }
  .timer-ring .track { stroke: #d8e2f8; }
  .timer-ring .progress { stroke: #4f8ef7; transition: stroke-dashoffset 1s linear; }
  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 700;
    color: #4f8ef7;
  }
  .timer-label {
    font-size: 14px;
    color: #9aaace;
    letter-spacing: 0.5px;
  }

  .card-back {
    font-size: 16px;
    color: #9aaace;
    cursor: pointer;
    padding: 12px 24px;
    border-radius: 10px;
    transition: color 0.2s;
  }
  .card-back:active { color: #6b7db3; }

  /* 공통 뒤로가기 헤더 */
  .screen-header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #6b7db3;
    font-size: 17px;
    cursor: pointer;
    padding: 8px 0;
  }
  .back-btn svg { width: 20px; height: 20px; fill: #6b7db3; }
  .back-btn:active { color: #4f8ef7; }
</style>
</head>
<body>

<!-- ① 메인 화면 -->
<div class="screen active" id="screen-main">
  <div class="logo-area">
    <h1>키오스크</h1>
    <p class="subtitle">서비스를 시작하려면 화면을 터치하세요</p>
  </div>
  <div class="touch-prompt">
    <div class="ring">
      <svg viewBox="0 0 24 24"><path d="M9 11.24V7.5C9 6.12 10.12 5 11.5 5S14 6.12 14 7.5v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74l-3.43-.72c-.08-.01-.15-.03-.24-.03-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.24.25.57.44.94.44h6.79c.75 0 1.33-.55 1.44-1.28l.75-5.27c.01-.07.02-.14.02-.2 0-.62-.38-1.16-.99-1.38z"/></svg>
    </div>
    <span>화면을 터치하세요</span>
  </div>
</div>

<!-- ② 생년월일 입력 화면 -->
<div class="screen" id="screen-birth">
  <div class="screen-header">
    <div class="back-btn" onclick="goTo('main')">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      처음으로
    </div>
  </div>

  <div class="birth-header">
    <h2>생년월일을 입력해주세요</h2>
    <p>주민등록상 생년월일 6자리를 입력하세요</p>
  </div>

  <div class="birth-display" id="birth-display">
    <div class="digit-box cursor" id="d0"></div>
    <div class="digit-box" id="d1"></div>
    <div class="digit-box" id="d2"></div>
    <div class="digit-box" id="d3"></div>
    <div class="digit-box" id="d4"></div>
    <div class="digit-box" id="d5"></div>
  </div>

  <p class="hint-text">예) 1990년 3월 15일 → 900315</p>
  <p class="birth-error" id="birth-error"></p>

  <div class="keypad">
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key key-empty"></div>
    <div class="key" onclick="pressKey('0')">0</div>
    <div class="key key-delete" onclick="pressDelete()">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="#7a8baa"><path d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/></svg>
    </div>
    <div class="key key-confirm" id="confirm-btn" onclick="confirmBirth()" style="display:none">확인</div>
  </div>
</div>

<!-- ③ 카드 입력 화면 -->
<div class="screen" id="screen-card">
  <div class="screen-header">
    <div class="back-btn" onclick="goTo('birth')">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      이전
    </div>
  </div>

  <div class="card-content">
    <div class="card-icon">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
    </div>
    <div class="card-title" id="card-title">카드를 넣어주세요</div>
    <div class="card-subtitle">카드를 단말기에 삽입하거나<br>카드를 가까이 대주세요</div>
    <div class="card-slot"><div class="card-slot-bar"></div></div>

    <div class="timer-wrap">
      <div class="timer-ring">
        <svg viewBox="0 0 80 80">
          <circle class="track" cx="40" cy="40" r="35"/>
          <circle class="progress" id="timer-circle" cx="40" cy="40" r="35"
            stroke-dasharray="220"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-num" id="timer-num">30</div>
      </div>
      <div class="timer-label">초 후 처음으로 돌아갑니다</div>
    </div>
  </div>
</div>

<script>
  // ── 설정: 생년월일과 이름을 여기서 변경하세요 ──
  const CONFIG = {
    birth: '500511',  // ← 6자리 생년월일로 변경 (예: '901215')
    name:  '고영자'
  };

  const CIRCUMFERENCE = 2 * Math.PI * 35;
  const TOTAL = 30;
  let timerInterval = null;
  let birthInput = [];

  function goTo(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + screen).classList.add('active');

    if (screen === 'birth') {
      resetBirth();
    } else if (screen === 'card') {
      startCardTimer();
    } else {
      clearCardTimer();
    }
  }

  document.getElementById('screen-main').addEventListener('click', () => goTo('birth'));

  // ── 생년월일 키패드 ──
  function pressKey(digit) {
    if (birthInput.length >= 6) return;
    document.getElementById('birth-error').textContent = '';
    birthInput.push(digit);
    updateDigitDisplay();
  }

  function pressDelete() {
    if (birthInput.length === 0) return;
    document.getElementById('birth-error').textContent = '';
    birthInput.pop();
    updateDigitDisplay();
  }

  function updateDigitDisplay() {
    for (let i = 0; i < 6; i++) {
      const box = document.getElementById('d' + i);
      box.textContent = birthInput[i] || '';
      box.classList.remove('cursor', 'filled');
      if (i < birthInput.length) {
        box.classList.add('filled');
      } else if (i === birthInput.length) {
        box.classList.add('cursor');
      }
    }
    document.getElementById('confirm-btn').style.display =
      birthInput.length === 6 ? 'flex' : 'none';
  }

  function confirmBirth() {
    if (birthInput.length < 6) return;
    const entered = birthInput.join('');
    if (entered === CONFIG.birth) {
      document.getElementById('card-title').textContent =
        CONFIG.name + ' 님 카드를 입력해주세요';
      goTo('card');
    } else {
      const display = document.getElementById('birth-display');
      display.classList.remove('shake');
      void display.offsetWidth;
      display.classList.add('shake');
      document.getElementById('birth-error').textContent =
        '일치하는 정보가 없습니다. 다시 확인해주세요.';
      birthInput = [];
      updateDigitDisplay();
    }
  }

  function resetBirth() {
    birthInput = [];
    document.getElementById('birth-error').textContent = '';
    updateDigitDisplay();
  }

  // ── 카드 화면 타이머 ──
  function startCardTimer() {
    clearCardTimer();
    let remaining = TOTAL;
    const circle = document.getElementById('timer-circle');
    const numEl = document.getElementById('timer-num');

    circle.style.strokeDasharray = CIRCUMFERENCE;
    circle.style.strokeDashoffset = 0;
    numEl.textContent = remaining;

    timerInterval = setInterval(() => {
      remaining--;
      numEl.textContent = remaining;
      circle.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / TOTAL);
      if (remaining <= 0) {
        clearCardTimer();
        goTo('main');
      }
    }, 1000);
  }

  function clearCardTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }
</script>
</body>
</html>
